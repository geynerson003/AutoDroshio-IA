version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: autodropship_db
    environment:
      POSTGRES_USER: autodropship
      POSTGRES_PASSWORD: autodropship
      POSTGRES_DB: autodropship
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodropship"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autodropship_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: autodropship_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autodropship_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    container_name: autodropship_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://autodropship:autodropship@db:5432/autodropship
      REDIS_URL: redis://redis:6379
      DEBUG: "True"
      SECRET_KEY: "your-secret-key-change-in-production"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - autodropship_network

  # Frontend React App (Dev mode with hot-reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autodropship_frontend
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - autodropship_network

volumes:
  postgres_data:
  redis_data:

networks:
  autodropship_network:
    driver: bridge
